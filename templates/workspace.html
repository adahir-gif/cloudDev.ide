<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CloudDev — Loading workspace…</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}
    .topbar{background:#161b22;border-bottom:1px solid #21262d;padding:10px 16px;display:flex;align-items:center;gap:12px}
    .logo-name{font-size:14px;font-weight:700;color:#e6edf3}
    .repo-pill{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:12px;color:#8b949e;font-family:monospace}
    .spinner-area{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
    .spinner{width:48px;height:48px;border:3px solid #21262d;border-top-color:#238636;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:18px;font-weight:600;color:#e6edf3}
    .steps{display:flex;flex-direction:column;gap:10px;text-align:left;min-width:280px}
    .step{display:flex;align-items:center;gap:10px;font-size:13px;color:#8b949e}
    .step.done{color:#3fb950}
    .step.active{color:#e6edf3}
    .step-dot{width:16px;height:16px;border-radius:50%;border:2px solid #30363d;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
    .step.done .step-dot{background:#238636;border-color:#238636;color:#fff}
    .step.active .step-dot{border-color:#388bfd;border-top-color:transparent;animation:spin 1s linear infinite}
  </style>
</head>
<body>
<div class="topbar">
  <svg width="18" height="18" viewBox="0 0 16 16" fill="#e6edf3"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  <div class="logo-name">CloudDev IDE</div>
  <div class="repo-pill">adahir-nullzone / backend-api</div>
</div>
<div class="spinner-area">
  <div class="spinner"></div>
  <h2>Setting up your workspace…</h2>
  <div class="steps">
    <div class="step done"><div class="step-dot">✓</div> Authenticated with GitHub</div>
    <div class="step done"><div class="step-dot">✓</div> Cloned repository</div>
    <div class="step done"><div class="step-dot">✓</div> Provisioned container (4 vCPU · 8 GB)</div>
    <div class="step active"><div class="step-dot"></div> Installing dependencies…</div>
    <div class="step"><div class="step-dot"></div> Starting dev server</div>
    <div class="step"><div class="step-dot"></div> Opening editor</div>
  </div>
</div>
</body>
</html>
